<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Schleimy Download Portal</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        :root[data-theme="dark"] { --bg: #0f0f0f; --surface: #1a1a1a; --text: #f3f4f6; --border: #334155; --primary: #3b82f6; }
        :root[data-theme="light"] { --bg: #f8fafc; --surface: #ffffff; --text: #0f172a; --border: #cbd5e1; --primary: #2563eb; }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); max-width: 900px; margin: 0 auto; padding: 2rem; transition: 0.3s; }
        .box { background: var(--surface); padding: 1.5rem; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 2rem; }
        h2 { border-left: 4px solid var(--primary); padding-left: 10px; margin-top: 0; }
        
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 10px; background: transparent; color: var(--text); border: 1px solid var(--border); border-radius: 4px; box-sizing: border-box;}
        button { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; transition: opacity 0.2s;}
        button:hover { opacity: 0.8; }
        button:disabled { background: #555; cursor: not-allowed; opacity: 0.6;}
        input:disabled, select:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .flex { display: flex; gap: 10px; }
        
        .theme-switch { position: absolute; top: 20px; right: 20px; cursor: pointer; background: var(--surface); border: 1px solid var(--border); padding: 5px 10px; border-radius: 20px; color: var(--text);}
        
        #qrResult { text-align: center; margin-top: 10px; }
        #qrResult img { max-width: 150px; border-radius: 8px; }

        .modal-overlay { 
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.6); backdrop-filter: blur(4px); animation: fadeIn 0.2s ease;
        }
        .modal-box { 
            background-color: var(--surface); margin: 15vh auto; padding: 2rem; border: 1px solid var(--border); 
            border-radius: 12px; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
        }
        .modal-text { margin-bottom: 1.5rem; font-size: 1.1rem; color: var(--text); white-space: pre-wrap; word-wrap: break-word; }
        .modal-btn { width: auto; padding: 8px 30px; font-size: 1rem; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<button class="theme-switch" onclick="toggleTheme()">🌗 Mode</button>
<h1 style="text-align: center; color: var(--primary);">Schleimy Download Portal</h1>

<div class="box" style="border-color: #10b981;">
    <h2 style="border-color: #10b981;">1. Scribd DocDownloader</h2>
    <input type="text" id="scribdUrl" placeholder="https://de.scribd.com/document/...">
    <button onclick="scrapeScribd()" style="background: #10b981;">Dokument Extrahieren</button>
    <textarea id="scribdOutput" rows="5" readonly placeholder="Text wird hier geladen..." style="margin-top:10px;"></textarea>
</div>

<div class="box" style="border-color: #ef4444; background: rgba(239, 68, 68, 0.05);">
    <h2 style="border-color: #ef4444; color: #ef4444;">2. Universal Media <span style="font-size: 0.7em; background: #ef4444; color: white; padding: 2px 6px; border-radius: 4px; vertical-align: middle; margin-left: 5px;">OFFLINE</span></h2>
    <p style="color: #ef4444; font-size: 0.9em; margin-top: -10px; margin-bottom: 15px; font-weight: bold;">
        Wegen extremer Server-Überlastung durch YouTube aktuell deaktiviert.
    </p>
    <div class="flex">
        <input type="text" id="mediaUrl" placeholder="Funktion deaktiviert..." style="flex: 2;" disabled>
        <select id="mediaType" style="flex: 1;" disabled>
            <option value="mp4">Video (MP4)</option>
        </select>
        <select id="mediaQuality" style="flex: 1;" disabled>
            <option value="max">Beste Qualität</option>
        </select>
    </div>
    <button disabled style="background: #ef4444;">Wartungsmodus</button>
</div>

<div class="box">
    <h2>3. Secure Pastebin (Passwort & Burn)</h2>
    <textarea id="pasteWrite" rows="4" placeholder="Dein geheimer Code/Text..."></textarea>
    <div class="grid-2">
        <input type="password" id="pastePass" placeholder="Passwort (Optional)">
        <label style="display: flex; align-items: center; gap: 5px;">
            <input type="checkbox" id="pasteBurn" style="width:auto;"> Burn nach dem Lesen
        </label>
    </div>
    <button onclick="createPaste()">Paste Erstellen</button>
    
    <hr style="border: 0; border-top: 1px solid var(--border); margin: 15px 0;">
    
    <div class="flex">
        <input type="text" id="pasteReadId" placeholder="Paste ID...">
        <input type="password" id="pasteReadPass" placeholder="Passwort...">
        <button onclick="readPaste()">Lesen</button>
    </div>
    
    <pre><code id="pasteCodeBlock" class="language-javascript"></code></pre>
</div>

<div class="box">
    <h2>4. URL Shortener & QR Generator</h2>
    <div class="flex">
        <input type="text" id="longUrl" placeholder="Langer Link...">
        <button onclick="shortenUrl()">Kürzen</button>
    </div>
    <p id="shortLinkResult" style="font-weight: bold; color: var(--primary);"></p>
    
    <button onclick="generateQR()" style="background: #6366f1;">QR Code von Link generieren</button>
    <div id="qrResult"></div>
</div>

<div id="customModal" class="modal-overlay">
    <div class="modal-box">
        <div id="modalMessage" class="modal-text">Nachricht hier</div>
        <button class="modal-btn" onclick="closeModal()">Verstanden</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script>
    let clipboardTemp = ""; // Zwischenspeicher für ID-Kopie

    function toggleTheme() {
        const root = document.documentElement;
        root.setAttribute('data-theme', root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    function showModal(msg, idToCopy = null) {
        document.getElementById('modalMessage').innerText = msg;
        clipboardTemp = idToCopy; // Speichert die ID für den Klick auf "Verstanden"
        document.getElementById('customModal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('customModal').style.display = 'none';
        // Auto-Kopie in die Zwischenablage!
        if(clipboardTemp) {
            navigator.clipboard.writeText(clipboardTemp).catch(()=>{});
            clipboardTemp = null;
        }
    }

    async function scrapeScribd() {
        const url = document.getElementById('scribdUrl').value;
        document.getElementById('scribdOutput').value = "Scraping läuft... (Kann bei Scribd etwas dauern)";
        try {
            const res = await fetch(`/api/scribd?url=${encodeURIComponent(url)}`);
            const data = await res.json();
            document.getElementById('scribdOutput').value = `TITEL: ${data.title}\n\nINHALT:\n${data.text}`;
        } catch (e) { 
            showModal("Fehler beim Scraping von Scribd.");
        }
    }

    async function createPaste() {
        const text = document.getElementById('pasteWrite').value;
        const password = document.getElementById('pastePass').value;
        const isBurn = document.getElementById('pasteBurn').checked;
        
        if (!text) return showModal("Bitte Text für den Paste eingeben!");

        try {
            const res = await fetch('/api/paste', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text, password, isBurn })
            });
            const data = await res.json();
            if(data.error) throw new Error(data.error);

            // Löscht die Felder nach Erfolg
            document.getElementById('pasteWrite').value = "";
            document.getElementById('pastePass').value = "";
            document.getElementById('pasteBurn').checked = false;

            showModal(`Erfolgreich in der Datenbank gespeichert!\n\nDeine ID: ${data.id}\n\n(Die ID wird beim Klick auf "Verstanden" automatisch kopiert)`, data.id);
        } catch (e) {
            showModal("Fehler beim Speichern. Hast du die Firebase-Daten im Server eingetragen?");
        }
    }

    async function readPaste() {
        const id = document.getElementById('pasteReadId').value;
        const password = document.getElementById('pasteReadPass').value;
        
        if (!id) return showModal("Bitte eine Paste-ID eingeben!");

        try {
            const res = await fetch('/api/paste/read', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, password })
            });
            const data = await res.json();
            
            if (data.error) return showModal(data.error);
            
            const codeBlock = document.getElementById('pasteCodeBlock');
            codeBlock.innerText = data.text;
            Prism.highlightElement(codeBlock);
        } catch(e) {
            showModal("Fehler beim Abrufen aus der Datenbank.");
        }
    }

    async function shortenUrl() {
        const url = document.getElementById('longUrl').value;
        if (!url) return showModal("Bitte einen Link eingeben!");

        try {
            const res = await fetch('/api/shorten', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url })
            });
            const data = await res.json();
            const shortUrl = window.location.origin + data.shortUrl;
            document.getElementById('shortLinkResult').innerText = shortUrl;
            document.getElementById('longUrl').value = shortUrl;
        } catch(e) {
            showModal("Fehler beim Erstellen des Links.");
        }
    }

    async function generateQR() {
        const data = document.getElementById('longUrl').value;
        if(!data) return showModal("Bitte erst einen Link eingeben!");
        try {
            const res = await fetch(`/api/qr?data=${encodeURIComponent(data)}`);
            const json = await res.json();
            document.getElementById('qrResult').innerHTML = `<img src="${json.qr}" alt="QR">`;
        } catch(e) {
            showModal("Fehler beim QR-Generieren.");
        }
    }
</script>
</body>
</html>
